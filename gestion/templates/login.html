<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStock - Connexion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            display: flex;
            width: 850px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* LEFT SIDE */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-left h1 {
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .login-left p {
            opacity: 0.9;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.6;
        }

        .slogan {
            margin-top: 30px;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 25px;
        }

        .slogan span {
            display: block;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* RIGHT SIDE */
        .login-right {
            flex: 1;
            background: #ffffff;
            padding: 40px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-login {
            background: #16a34a;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-login:hover {
            background: #15803d;
        }

        .title {
            font-weight: 700;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 25px;
        }

        .food-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <!-- LEFT PANEL -->
        <div class="login-left">
            <div class="food-icon">🍽️</div>
            <h1>FoodStock</h1>
            <p>Gestion intelligente de stock alimentaire</p>

            <div class="slogan">
                <span>⚡ Gérez.</span>
                <span>📊 Suivez.</span>
                <span>🎯 Anticipez.</span>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="login-right">

            <div class="title">Connexion</div>
            <div class="subtitle">Accédez à votre espace FoodStock</div>

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" placeholder="Entrer votre username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-login w-100 text-white">
                    🔐 Se connecter
                </button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
